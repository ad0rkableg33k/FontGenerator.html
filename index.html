<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>𝔽𝖆𝖓𝖈𝕪 𝔽𝖔𝖓𝕥 𝕲𝖊𝖓𝖊𝖗𝕒𝕥𝖔𝖗</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=UnifrakturMaguntia&family=MedievalSharp&display=swap');

  :root {
    --bg:        #0a0007;
    --bg2:       #110010;
    --card:      #180016;
    --card-hover:#220020;
    --border:    #3a0038;
    --pink:      #ff2d78;
    --pink-dim:  #c4005a;
    --pink-glow: #ff2d7844;
    --magenta:   #ff00cc;
    --text:      #f0d0f5;
    --muted:     #9966aa;
    --copied:    #ff2d78;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: "Segoe UI Symbol","Noto Sans","Noto Sans Symbols","Arial Unicode MS",
      "Times New Roman","Lucida Console","Courier New",monospace,serif,sans-serif;
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* ── Drippy top border ── */
  body::before {
    content: '';
    display: block;
    height: 6px;
    background: linear-gradient(90deg, var(--pink), var(--magenta), var(--pink));
    box-shadow: 0 0 18px 4px var(--pink-glow);
  }

  /* ── Header ── */
  header {
    text-align: center;
    padding: 2rem 1rem 1.2rem;
    position: relative;
  }

  .skull-row {
    font-size: 1.4rem;
    letter-spacing: 0.3rem;
    opacity: 0.55;
    margin-bottom: 0.5rem;
    user-select: none;
  }

  header h1 {
    font-size: clamp(1.6rem, 5vw, 3rem);
    background: linear-gradient(135deg, var(--pink), var(--magenta), #ff80d5);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    text-shadow: none;
    filter: drop-shadow(0 0 14px var(--pink));
    line-height: 1.15;
    letter-spacing: 0.04em;
  }

  .byline {
    margin-top: 0.4rem;
    font-size: 0.78rem;
    color: var(--muted);
    letter-spacing: 0.2em;
    text-transform: uppercase;
  }

  .divider {
    margin: 1.2rem auto 0;
    width: 80%;
    max-width: 600px;
    height: 1px;
    background: linear-gradient(90deg, transparent, var(--pink), transparent);
    opacity: 0.5;
  }

  /* ── Sticky input zone ── */
  .input-zone {
    position: sticky;
    top: 0;
    z-index: 100;
    background: var(--bg2);
    border-bottom: 1px solid var(--border);
    padding: 0.9rem 1.2rem;
    box-shadow: 0 4px 20px #000a;
    display: flex;
    flex-direction: column;
    gap: 0.6rem;
  }

  .input-row {
    display: flex;
    gap: 0.6rem;
    align-items: stretch;
  }

  #input {
    flex: 1;
    background: #0e000d;
    border: 1px solid var(--border);
    border-radius: 8px;
    color: var(--text);
    font-size: 1.1rem;
    padding: 0.6rem 0.9rem;
    resize: none;
    height: 52px;
    font-family: inherit;
    outline: none;
    transition: border-color 0.2s, box-shadow 0.2s;
  }
  #input:focus {
    border-color: var(--pink);
    box-shadow: 0 0 0 2px var(--pink-glow);
  }
  #input::placeholder { color: var(--muted); opacity: 0.7; }

  .clear-btn {
    background: transparent;
    border: 1px solid var(--border);
    border-radius: 8px;
    color: var(--muted);
    cursor: pointer;
    font-size: 1.1rem;
    padding: 0 0.8rem;
    transition: color 0.2s, border-color 0.2s;
  }
  .clear-btn:hover { color: var(--pink); border-color: var(--pink); }

  /* ── Search & decorator row ── */
  .controls-row {
    display: flex;
    gap: 0.5rem;
    flex-wrap: wrap;
    align-items: center;
  }

  #search {
    flex: 1;
    min-width: 120px;
    background: #0e000d;
    border: 1px solid var(--border);
    border-radius: 6px;
    color: var(--text);
    font-size: 0.82rem;
    padding: 0.35rem 0.7rem;
    outline: none;
    transition: border-color 0.2s;
  }
  #search:focus { border-color: var(--pink-dim); }
  #search::placeholder { color: var(--muted); font-size: 0.78rem; }

  .dec-label {
    font-size: 0.72rem;
    color: var(--muted);
    white-space: nowrap;
  }

  .dec-btn {
    background: #1a0018;
    border: 1px solid var(--border);
    border-radius: 6px;
    color: var(--text);
    cursor: pointer;
    font-size: 0.95rem;
    padding: 0.25rem 0.55rem;
    transition: background 0.15s, border-color 0.15s, box-shadow 0.15s;
    user-select: none;
    line-height: 1.4;
  }
  .dec-btn:hover {
    background: var(--card-hover);
    border-color: var(--pink);
    box-shadow: 0 0 8px var(--pink-glow);
  }
  .dec-btn.active {
    background: #3a003a;
    border-color: var(--pink);
    box-shadow: 0 0 10px var(--pink-glow);
    color: var(--pink);
  }

  /* ── Card grid ── */
  #outputs {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
    gap: 0.75rem;
    padding: 1rem 1rem 2rem;
    max-width: 1600px;
    margin: 0 auto;
  }

  .card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 0.75rem 0.9rem;
    display: flex;
    flex-direction: column;
    gap: 0.4rem;
    transition: border-color 0.18s, box-shadow 0.18s, background 0.18s;
    cursor: pointer;
    position: relative;
    overflow: hidden;
  }
  .card::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 2px;
    background: linear-gradient(90deg, var(--pink), var(--magenta));
    opacity: 0;
    transition: opacity 0.2s;
  }
  .card:hover {
    border-color: var(--pink-dim);
    box-shadow: 0 0 16px var(--pink-glow);
    background: var(--card-hover);
  }
  .card:hover::before { opacity: 1; }

  /* Click-to-copy hint */
  .card-name::after {
    content: ' ✦ click to copy';
    font-size: 0.62rem;
    color: var(--pink);
    opacity: 0;
    transition: opacity 0.2s;
    font-style: italic;
  }
  .card:hover .card-name::after { opacity: 0.7; }
  .card.copied .card-name::after { content: ' ✦ copied!'; opacity: 1; }

  .card.copied {
    border-color: var(--pink) !important;
    box-shadow: 0 0 24px var(--pink-glow) !important;
    background: #2a0028 !important;
  }
  .card.copied::before { opacity: 1 !important; }

  .card-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 0.4rem;
  }

  .card-name {
    font-size: 0.72rem;
    color: var(--muted);
    letter-spacing: 0.05em;
    text-transform: uppercase;
    flex: 1;
  }

  .card-actions {
    display: flex;
    gap: 0.3rem;
    opacity: 0;
    transition: opacity 0.15s;
  }
  .card:hover .card-actions { opacity: 1; }

  .action-btn {
    background: #2a0028;
    border: 1px solid var(--border);
    border-radius: 5px;
    color: var(--muted);
    cursor: pointer;
    font-size: 0.68rem;
    padding: 0.15rem 0.4rem;
    white-space: nowrap;
    transition: color 0.15s, border-color 0.15s, background 0.15s;
    font-family: inherit;
  }
  .action-btn:hover {
    color: var(--pink);
    border-color: var(--pink);
    background: #3a0038;
  }

  .card-text {
    font-size: 1.35rem;
    line-height: 1.5;
    word-break: break-word;
    min-height: 1.8rem;
    color: #f5e0ff;
  }

  .card-dec {
    font-size: 0.8rem;
    color: var(--pink);
    opacity: 0.85;
    min-height: 1rem;
    word-break: break-word;
    display: none;
  }
  .card-dec.visible { display: block; }

  /* ── Toast ── */
  #toast {
    position: fixed;
    bottom: 1.5rem;
    left: 50%;
    transform: translateX(-50%) translateY(80px);
    background: var(--pink);
    color: #000;
    font-size: 0.85rem;
    font-weight: 700;
    letter-spacing: 0.08em;
    padding: 0.5rem 1.2rem;
    border-radius: 999px;
    box-shadow: 0 0 20px var(--pink);
    transition: transform 0.25s cubic-bezier(0.34,1.56,0.64,1), opacity 0.25s;
    opacity: 0;
    pointer-events: none;
    z-index: 999;
    white-space: nowrap;
  }
  #toast.show {
    transform: translateX(-50%) translateY(0);
    opacity: 1;
  }

  /* ── Footer ── */
  footer {
    text-align: center;
    padding: 1rem;
    font-size: 0.72rem;
    color: var(--muted);
    border-top: 1px solid var(--border);
    opacity: 0.6;
  }

  /* ── Empty state ── */
  .empty-state {
    grid-column: 1/-1;
    text-align: center;
    padding: 3rem;
    color: var(--muted);
    font-size: 2rem;
    opacity: 0.4;
  }
</style>
</head>

// ── State ──
let activeDecorator = null;
let toastTimer = null;

// ── UI elements ──
const inputEl   = document.getElementById('input');
const clearBtn  = document.getElementById('clearBtn');
const searchEl  = document.getElementById('search');
const outputsEl = document.getElementById('outputs');
const toastEl   = document.getElementById('toast');
const decBtns   = document.querySelectorAll('.dec-btn');

// ── Decorator buttons ──
decBtns.forEach(btn => {
  btn.addEventListener('click', () => {
    if (btn.classList.contains('active')) {
      btn.classList.remove('active');
      activeDecorator = null;
    } else {
      decBtns.forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      activeDecorator = btn.dataset.wrap;
    }
    render();
  });
});

// ── Clear button ──
clearBtn.addEventListener('click', () => {
  inputEl.value = '';
  render();
  inputEl.focus();
});

// ── Input & search ──
inputEl.addEventListener('input', render);
searchEl.addEventListener('input', render);

// ── Toast ──
function showToast(msg) {
  toastEl.textContent = msg;
  toastEl.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => toastEl.classList.remove('show'), 1600);
}

// ── Apply decorator ──
function applyDecorator(text, template) {
  if (!template || !text) return text;
  return template.replace('{text}', text);
}

// ── Convert one style ──
function convert(styleDef, raw) {
  if (typeof styleDef === 'function') return styleDef(raw);
  let out = '';
  for (let ch of raw) {
    const i = normal.indexOf(ch);
    out += i !== -1 ? styleDef[i] : ch;
  }
  return out;
}

// ── Copy helper ──
function copyText(text, cardEl) {
  navigator.clipboard.writeText(text).then(() => {
    cardEl.classList.add('copied');
    setTimeout(() => cardEl.classList.remove('copied'), 400);
    showToast('✦ Copied! ✦');
  });
}

// ── Main render ──
function render() {
  const raw    = inputEl.value;
  const filter = searchEl.value.toLowerCase();
  outputsEl.innerHTML = '';

  const entries = Object.entries(styles).filter(([name]) =>
    !filter || name.toLowerCase().includes(filter)
  );

  if (!raw && !filter) {
    const empty = document.createElement('div');
    empty.className = 'empty-state';
    empty.textContent = '☠ type something ☠';
    outputsEl.appendChild(empty);
    return;
  }

  for (const [name, styleDef] of entries) {
    const converted = convert(styleDef, raw);
    const decorated = applyDecorator(converted, activeDecorator);

    const card = document.createElement('div');
    card.className = 'card';

    // header
    const hdr = document.createElement('div');
    hdr.className = 'card-header';

    const nameEl = document.createElement('div');
    nameEl.className = 'card-name';
    nameEl.textContent = name;

    const actions = document.createElement('div');
    actions.className = 'card-actions';

    // Copy with decorator (only shown when a decorator is active)
    const btnDec = document.createElement('button');
    btnDec.className = 'action-btn';
    btnDec.title = 'Copy with decorator';
    btnDec.textContent = 'copy +deco';
    btnDec.style.display = activeDecorator ? 'inline-block' : 'none';
    btnDec.addEventListener('click', e => {
      e.stopPropagation();
      copyText(decorated, card);
    });

    // Re-roll (random styles only)
    if (typeof styleDef === 'function') {
      const btnReroll = document.createElement('button');
      btnReroll.className = 'action-btn';
      btnReroll.textContent = '🎲';
      btnReroll.title = 'Re-roll random';
      btnReroll.addEventListener('click', e => {
        e.stopPropagation();
        const newResult = convert(styleDef, raw);
        const newDec    = applyDecorator(newResult, activeDecorator);
        textEl.textContent  = newResult;
        decEl.textContent   = newDec;
        copyText(activeDecorator ? newDec : newResult, card);
      });
      actions.appendChild(btnReroll);
    }

    actions.appendChild(btnDec);

    hdr.appendChild(nameEl);
    hdr.appendChild(actions);

    // main text
    const textEl = document.createElement('div');
    textEl.className = 'card-text';
    textEl.textContent = converted;

    // decorated preview
    const decEl = document.createElement('div');
    decEl.className = 'card-dec' + (activeDecorator ? ' visible' : '');
    decEl.textContent = decorated;

    card.appendChild(hdr);
    card.appendChild(textEl);
    card.appendChild(decEl);

    // click card = copy (decorated if active, plain otherwise)
    card.addEventListener('click', () => {
      copyText(activeDecorator ? decorated : converted, card);
    });

    outputsEl.appendChild(card);
  }
}

render();
</script>
</body>
</html>
